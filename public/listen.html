<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Listen — Local Audio Broadcast</title>
<style>
  body {
    font-family: -apple-system, Segoe UI, Roboto, sans-serif;
    background: #111827;
    color: #f3f4f6;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
    box-sizing: border-box;
    text-align: center;
  }
  h1 { font-size: 1.4rem; margin-bottom: 8px; }
  #status {
    color: #9ca3af;
    margin-bottom: 32px;
    font-size: 1rem;
  }
  #status.live { color: #22c55e; font-weight: 600; }
  button#listenBtn {
    background: #3b82f6;
    color: white;
    border: none;
    font-size: 1.3rem;
    font-weight: 700;
    padding: 28px 56px;
    border-radius: 16px;
    cursor: pointer;
  }
  button#listenBtn:disabled {
    background: #4b5563;
    cursor: not-allowed;
  }
  button#listenBtn.playing {
    background: #22c55e;
  }
  #debugLog {
    margin-top: 24px;
    width: 100%;
    max-width: 500px;
    max-height: 40vh;
    overflow-y: auto;
    background: #000;
    color: #4ade80;
    font-family: monospace;
    font-size: 0.75rem;
    text-align: left;
    padding: 10px;
    border-radius: 8px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  #syncVideo {
    display: none;
    width: 100%;
    max-width: 480px;
    background: black;
    border-radius: 10px;
    margin-bottom: 12px;
  }
  #fullscreenBtn {
    display: none;
    background: #1f2937;
    color: #f3f4f6;
    border: 2px solid #374151;
    font-size: 0.9rem;
    font-weight: 600;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 20px;
  }
</style>
</head>
<body>
  <h1>Local Audio Broadcast</h1>
  <div id="status">Connecting…</div>

  <!-- Sync Local File mode -->
  <video id="syncVideo" playsinline controls></video>
  <button id="fullscreenBtn">Fullscreen ⛶</button>

  <button id="listenBtn" disabled>Listen</button>
  <audio id="audioEl" autoplay playsinline></audio>

  <div id="debugLog"></div>

  <script src="listen.js"></script>
</body>
</html>
